<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found · Casey McDougal</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=4">
  <style>
    :root {
      --bg: #faf7f2;
      --surface: #fffdfa;
      --fg: #1c1a17;
      --muted: #8a817a;
      --border: #ded7ce;
      --accent: #c0512f;
      --font-display: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
      --font-body: 'Söhne', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 32px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    main { width: min(100%, 620px); }
    .meta { margin: 0 0 22px; color: var(--accent); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
    h1 { margin: 0; font-family: var(--font-display); font-size: clamp(52px, 10vw, 88px); font-weight: 500; line-height: 0.98; letter-spacing: -0.045em; text-wrap: balance; }
    p { max-width: 46ch; margin: 24px auto 32px; color: var(--muted); font-size: 18px; line-height: 1.6; text-wrap: pretty; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 20px;
      border: 1px solid var(--accent);
      border-radius: 12px;
      background: var(--accent);
      color: var(--surface);
      font-size: 14px;
      font-weight: 650;
      text-decoration: none;
    }
    a:hover { background: color-mix(in oklch, var(--accent) 88%, var(--fg)); }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }
  </style>
</head>
<body>
  <main data-od-id="not-found">
    <p class="meta">404 · A Quiet Dead End</p>
    <h1>This Page Isn’t Here.</h1>
    <p>The link may be old, or the idea may have moved somewhere better. The homepage is still exactly where it should be.</p>
    <a href="/">Return home</a>
  </main>
</body>
</html>
